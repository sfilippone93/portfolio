<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="uploads/win xp logo complete.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santiago Filippone XP — Welcome</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    font-family: Tahoma, 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ── MAIN SCREEN ── */
  #welcome-screen {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    background: #3A6BC4;
  }

  /* ── TOP BAR ── */
  .xp-top-bar {
    height: 80px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #0C1A6E 0%, #1A2FA0 40%, #1E3BAA 100%);
    border-bottom: 1px solid #0A1460;
  }

  /* ── MAIN AREA ── */
  .xp-main {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Dotted/noise texture like XP welcome screen */
    background:
      radial-gradient(ellipse at 30% 50%, rgba(80,120,210,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 50%, rgba(30,60,160,0.3) 0%, transparent 60%),
      #3A6BC4;
  }

  /* Subtle dot texture */
  .xp-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
  }

  /* ── INNER LAYOUT ── */
  .xp-welcome-layout {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: 100%;
    max-width: 900px;
    padding: 0 60px;
    position: relative;
    z-index: 1;
  }

  /* ── LEFT SIDE: LOGO + BRANDING ── */
  .xp-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-right: 60px;
    margin-top: -30px;
  }

  .xp-logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    margin-top: 10px;
    margin-bottom: 16px;
    padding-right: 20px;
  }

  /* Windows flag SVG */
  .win-flag {
    width: 100px;
    height: auto;
    margin-bottom: -30px;
    display: block;
  }

  .xp-brand-name {
    font-size: 38px;
    font-weight: bold;
    font-style: italic;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.5px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.35);
    display: inline-block;
    white-space: nowrap;
  }

  .xp-brand-name .xp-sup {
    font-size: 18px;
    font-style: italic;
    color: #FF9C3A;
    font-weight: bold;
    vertical-align: super;
    margin-left: 2px;
    transform: translateY(-14px);
    display: inline-block;
  }

  .xp-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-top: 3px;
    letter-spacing: 0.2px;
    align-self: flex-start;
  }

  .xp-instruction {
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    margin-top: 14px;
    font-style: italic;
  }

  /* ── DIVIDER ── */
  .xp-divider {
    width: 1px;
    height: 260px;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.6) 15%, rgba(255,255,255,0.6) 85%, transparent 100%);
    flex-shrink: 0;
    align-self: center;
  }

  /* ── RIGHT SIDE: USER ── */
  .xp-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-left: 60px;
    justify-content: center;
  }

  .xp-user {
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    padding: 8px;
    border-radius: 4px;
    transition: background 0.1s;
    margin-top: -20px;
  }

  .xp-user:hover {
    background: rgba(255,255,255,0.12);
  }

  .xp-user:hover .xp-user-avatar {
    box-shadow: 0 0 0 2px rgba(255,255,255,0.8), 0 4px 12px rgba(0,0,0,0.4);
  }

  .xp-user-avatar {
    width: 64px;
    height: 64px;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 3px;
    flex-shrink: 0;
    overflow: hidden;
    background: #5580D0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .xp-user-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .xp-user-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .xp-user-name {
    font-size: 20px;
    font-weight: normal;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    letter-spacing: 0.1px;
  }

  .xp-user-role {
    font-size: 13px;
    color: #FF9C3A;
    font-weight: normal;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  /* ── BOTTOM BAR ── */
  .xp-bottom-bar {
    height: 80px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #0C1A6E 0%, #111E80 40%, #0D1870 100%);
    border-top: 2px solid #E8A030;
    display: flex;
    align-items: center;
    padding: 0 14px;
    justify-content: space-between;
  }

  .xp-restart-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 12px;
    font-family: Tahoma, Arial, sans-serif;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 2px;
    background: none;
    border: none;
  }
  .xp-restart-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  .xp-restart-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .xp-bottom-text {
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    text-align: right;
    line-height: 1.5;
    max-width: 360px;
  }

  /* ── WELCOME OVERLAY ── */
  #login-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(80,120,210,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 50%, rgba(30,60,160,0.3) 0%, transparent 60%),
      #4A6ED4;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #login-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 14vh;
    background: linear-gradient(180deg, #0C1A6E 0%, #1A2FA0 50%, #1E3BAA 100%);
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  #login-overlay::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 14vh;
    background: linear-gradient(180deg, #1E3BAA 0%, #1A2FA0 50%, #0C1A6E 100%);
    border-top: 2px solid #E8A030;
  }
  #login-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .welcome-text {
    font-size: 48px;
    font-style: italic;
    font-weight: bold;
    transform: skewX(-8deg);
    color: #fff;
    text-shadow: 1px 2px 6px rgba(0,0,0,0.3);
    letter-spacing: 2px;
    font-family: 'Franklin Gothic Medium', 'Franklin Gothic', 'ITC Franklin Gothic', Arial Narrow, Arial, sans-serif;
    position: relative;
    z-index: 1;
  }

  /* ── FADE TO DESKTOP ── */
  #fade-out {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #fade-out.active {
    opacity: 1;
  }
</style>
</head>

<script>
  const sound = document.getElementById('startup-sound');
  sound.volume = 0.7;

  // Login flow
  function doLogin() {
    // Play sound on user gesture — browsers allow this
    sound.currentTime = 0;
    sound.play().catch(() => {});

    const overlay = document.getElementById('login-overlay');
    const fadeEl = document.getElementById('fade-out');

    overlay.classList.add('visible');

    // Show welcome screen for 2 seconds then fade to desktop
    setTimeout(() => {
      fadeEl.classList.add('active');
      setTimeout(() => {
        window.location.href = 'desktop.html';
      }, 700);
    }, 2000);
  }

  // Keyboard: Enter/Space triggers login
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') doLogin();
  });
</script>
