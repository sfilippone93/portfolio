<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="uploads/win xp logo complete.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santiago Filippone XP</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: Tahoma, 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ── LOADING SCREEN ── */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #loading-screen.fade-out {
    animation: fadeOut 0.6s ease-in forwards;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; pointer-events: none; }
  }

  .loading-logo {
    width: 140px;
    height: auto;
    margin-bottom: 18px;
  }

  .loading-brand {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 6px;
  }

  .loading-name {
    font-size: 52px;
    font-weight: bold;
    font-style: italic;
    color: #fff;
    letter-spacing: -1px;
    text-shadow: 0 0 30px rgba(255,255,255,0.08);
    font-family: Tahoma, Arial, sans-serif;
  }

  .loading-xp {
    font-size: 26px;
    font-style: italic;
    font-weight: bold;
    color: #D45A1A;
    vertical-align: super;
    margin-left: 3px;
    font-family: Tahoma, Arial, sans-serif;
  }

  .loading-tagline {
    font-size: 16px;
    font-style: italic;
    color: #fff;
    margin-bottom: 40px;
    letter-spacing: 0.3px;
    font-family: Tahoma, Arial, sans-serif;
  }

  /* ── XP PROGRESS BAR ── */
  .xp-progress-wrap {
    width: 150px;
    height: 16px;
    border: 2px solid #b2b2b2;
    border-radius: 7px;
    margin: 0 auto;
    padding: 2px 1px;
    overflow: hidden;
    font-size: 0;
  }

  .box {
    width: 9px;
    height: 100%;
    background: linear-gradient(to bottom, #2838c7 0%, #5979ef 17%, #869ef3 32%, #869ef3 45%, #5979ef 59%, #2838c7 100%);
    display: inline-block;
    margin-right: 2px;
    animation: loader 2s infinite;
    animation-timing-function: linear;
  }

  @keyframes loader {
    0%   { transform: translate(-30px); }
    100% { transform: translate(150px); }
  }

  /* ── BOTTOM CORNERS ── */
  .loading-bottom-left {
    position: fixed;
    bottom: 28px;
    left: 28px;
    color: #fff;
    font-size: 12px;
    line-height: 1.6;
    font-family: Tahoma, Arial, sans-serif;
    opacity: 0.85;
  }

  .loading-bottom-right {
    position: fixed;
    bottom: 28px;
    right: 28px;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    font-style: italic;
    font-family: Tahoma, Arial, sans-serif;
    letter-spacing: -0.5px;
  }

  .loading-bottom-right span {
    font-size: 10px;
    font-style: normal;
    font-weight: normal;
    vertical-align: super;
    margin-left: 1px;
  }
</style>
</head>
